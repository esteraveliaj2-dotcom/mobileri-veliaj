<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuzhina – Mobileri Veliaj</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto&display=swap" rel="stylesheet">

<style>
  body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
  color: #333;
}


  header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 60px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(5px);
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  position: sticky;
  top: 0;
  z-index: 100;
}
nav {
  display: flex;
  gap: 25px;
}
nav a {
  text-decoration: none;
  color: #000;
  font-weight: 500;
  font-size: 16px;
  transition: color 0.3s;
}

nav a:hover { color: #e67e22; }

/* HERO */
.hero {
  height: 550px;
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
              url("kuzhina/kuzhina1.jpeg");
  background-size: cover;
  background-position: center;
  background-attachment: fixed; /* paralaks */
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  animation: fadeHero 1.5s ease;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  letter-spacing: 2px;
  font-weight: 700;
  margin-bottom: 20px;
}
.hero button {
  padding: 12px 25px;
  background-color: #555555;
  border: none;
  border-radius: 5px;
  color: white;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.3s, transform 0.3s;
}
.hero button:hover {
  background-color: #777777;
  transform: scale(1.05);
}

@keyframes fadeHero {
  from { opacity: 0; transform: translateY(-20px);}
  to { opacity: 1; transform: translateY(0);}
}
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px;
  padding: 40px 60px 80px 60px;
  max-width: 1200px;
  margin: auto;
}
.gallery img {
  width: 100%;
  aspect-ratio: 4/3; /* uniformizo madhësinë */
  object-fit: cover;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}
.gallery img:hover {
  transform: scale(1.08);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.modal {
  display: none; 
  position: fixed;
  z-index: 1000;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}
.modal-content {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
  transition: transform 0.3s ease;
}
.close-modal, .prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: white;
  font-size: 50px;
  cursor: pointer;
  user-select: none;
  padding: 10px;
}
.close-modal {
  top: 20px;
  right: 30px;
  font-size: 35px;
}
.prev { left: 20px; }
.next { right: 20px; }
.prev:hover, .next:hover, .close-modal:hover { color: #aaa; }
footer {
  text-align: center;
  padding: 50px;
  background: #111;
  color: white;
  margin-top: 60px;
}
 
</style>
</head>
<body>
<header>
  <h2>Mobileri Veliaj</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#about">Rreth Nesh</a>
    <a href="index.html#kontakt">Kontakt</a>
  </nav>
</header>

<section class="hero">
  <h1>Kuzhina</h1>
  <button onclick="document.querySelector('.gallery').scrollIntoView({behavior:'smooth'})">
    Shiko Galerinë
  </button>
</section>

<section class="gallery">
  <img src="kuzhina/kuzhina1.jpeg" alt="Kuzhina 1">
  <img src="kuzhina/kuzhina2.jpeg" alt="Kuzhina 2">
  <img src="kuzhina/kuzhina3.jpeg" alt="Kuzhina 3">
  <img src="kuzhina/kuzhina4.jpeg" alt="Kuzhina 4">
  <img src="kuzhina/kuzhina7.jpeg" alt="Kuzhina 7">
  <img src="kuzhina/kuzhina8.jpeg" alt="Kuzhina 8">
  <img src="kuzhina/kuzhina9.jpeg" alt="Kuzhina 9">
  <img src="kuzhina/kuzhina10.jpeg" alt="Kuzhina 10">
  <img src="kuzhina/k11.jpeg" alt="K 11">
  <img src="kuzhina/k12.jpeg" alt="K 12">
  <img src="kuzhina/k13.jpeg" alt="K 13">
  <img src="kuzhina/k14.jpeg" alt="K 14">
</section>

<div id="myModal" class="modal">
  <span class="close-modal" onclick="closeModal()">&times;</span>
  <span class="prev" onclick="changeSlide(-1)">&#10094;</span>
  <span class="next" onclick="changeSlide(1)">&#10095;</span>
  <img class="modal-content" id="imgFull">
</div>

<footer>
  &copy; 2026 Mobileri Veliaj
</footer>

<script>
const fotos = document.querySelectorAll('.gallery img');
const modal = document.getElementById("myModal");
const modalImg = document.getElementById("imgFull");
let currentIndex = 0;

fotos.forEach((foto, index) => {
  foto.addEventListener('click', () => {
    currentIndex = index;
    modal.style.display = "flex";
    modalImg.src = foto.src;
  });
});
function closeModal() { modal.style.display = "none"; }
function changeSlide(direction) {
  currentIndex += direction;
  if(currentIndex < 0) currentIndex = fotos.length - 1;
  if(currentIndex >= fotos.length) currentIndex = 0;
  modalImg.src = fotos[currentIndex].src;
}

window.addEventListener('click', function(e) {
  if(e.target == modal) closeModal();
});

window.addEventListener('keydown', function(e) {
  if(modal.style.display === "flex") {
    if(e.key === "ArrowLeft") changeSlide(-1);
    if(e.key === "ArrowRight") changeSlide(1);
    if(e.key === "Escape") closeModal();
  }
});
</script>

</body>
</html>
